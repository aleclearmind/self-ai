name: Build and push container image

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            extra-substituters = https://cache.flox.dev https://nix-community.cachix.org https://cache.nixos-cuda.org
            extra-trusted-substituters = https://cache.flox.dev https://nix-community.cachix.org https://cache.nixos-cuda.org
            extra-trusted-public-keys = flox-cache-public-1:7F4OyH7ZCnFhcze3fJdfyXYLQw/aV7GEed86nQ7IsOs= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=
            experimental-features = nix-command flakes

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          for PACKAGE in $(nix flake show --json | jq -r '.packages["x86_64-linux"] | keys | .[]' | grep whisper); do
            echo "Building $PACKAGE" > /dev/stderr
            nix build .#'"'"$PACKAGE"'"' -L

            echo "Pushing $PACKAGE" > /dev/stderr
            IMAGE_NAME="vast-ai-nix-$PACKAGE"
            IMAGE=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
            docker load < result
            docker tag $IMAGE_NAME:latest "$IMAGE:latest"
            docker tag $IMAGE_NAME:latest "$IMAGE:${{ github.sha }}"
            docker push "$IMAGE:latest"
            docker push "$IMAGE:${{ github.sha }}"
          done
