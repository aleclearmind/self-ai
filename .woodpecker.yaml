when:
  branch: master
  event: push

steps:
  - name: Build and push image
    image: nixos/nix:latest

    environment:
      GITHUB_PACKAGES_TOKEN:
        from_secret: GITHUB_PACKAGES_TOKEN
      ATTIC_TOKEN:
        from_secret: ATTIC_TOKEN

    commands:
      - echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf
      - nix profile add nixpkgs/nixos-25.11#{skopeo,jq,attic-client}
      - |
        set -euo pipefail
        set -x

        function log() {
          echo "$1" > /dev/stderr
        }

        log "Logging into nix cache"
        ATTIC_ENDPOINT=clearmindme
        ATTIC_CACHE="$ATTIC_ENDPOINT:self-ai"
        attic login "$ATTIC_ENDPOINT" https://clearmind.me/attic/ "$ATTIC_TOKEN"
        attic use "$ATTIC_CACHE"

        # Push each derivation to the cache as soon as it's built.
        cat > /tmp/push-hook.sh << HOOK
        #!/bin/sh
        set -eu
        set -f
        export IFS=' '
        for attempt in 1 2 3; do
          if attic push "$ATTIC_CACHE" \$OUT_PATHS; then
            exit 0
          fi
        done
        echo "Failed to push \$OUT_PATHS after 3 attempts" >&2
        exit 1
        HOOK
        chmod +x /tmp/push-hook.sh
        echo "post-build-hook = /tmp/push-hook.sh" >> /etc/nix/nix.conf

        # ALLOWED='vllm-6.1|whisper-6.1'
        # ALLOWED='^vllm$'
        # ALLOWED='vllm-6.1'
        # ALLOWED='vllm-12.0'
        ALLOWED='whisper-6.1|container-base'
        for PACKAGE in $(nix flake show --json | jq -r '.packages["x86_64-linux"] | keys | .[]' | grep -E "$ALLOWED"); do

          log "Building $PACKAGE"
          nix build .#"\"$PACKAGE\"" -L

          if [[ "$PACKAGE" == container-* ]]; then
            log "Pushing $PACKAGE to ghcr.io"
            IMAGE_NAME="vast-ai-nix-$PACKAGE"
            IMAGE="ghcr.io/$CI_REPO_OWNER/$IMAGE_NAME"
            skopeo --insecure-policy copy --dest-creds="$CI_REPO_OWNER:$GITHUB_PACKAGES_TOKEN" docker-archive:result "docker://$IMAGE:latest"
            skopeo --insecure-policy copy --dest-creds="$CI_REPO_OWNER:$GITHUB_PACKAGES_TOKEN" docker-archive:result "docker://$IMAGE:$CI_COMMIT_SHA"
          fi

        done
