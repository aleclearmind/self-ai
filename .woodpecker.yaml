when:
  branch: master
  event: push

steps:
  - name: Build and push image
    image: nixos/nix:latest

    environment:
      GITHUB_PACKAGES_TOKEN:
        from_secret: GITHUB_PACKAGES_TOKEN

    commands:
      - echo "extra-substituters = https://cache.flox.dev https://nix-community.cachix.org https://cache.nixos-cuda.org" >> /etc/nix/nix.conf
      - echo "extra-trusted-substituters = https://cache.flox.dev https://nix-community.cachix.org https://cache.nixos-cuda.org" >> /etc/nix/nix.conf
      - echo "extra-trusted-public-keys = flox-cache-public-1:7F4OyH7ZCnFhcze3fJdfyXYLQw/aV7GEed86nQ7IsOs= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=" >> /etc/nix/nix.conf
      - echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf
      - nix profile install nixpkgs#skopeo nixpkgs#jq
      - |
        set -euo pipefail
        set -x
        for PACKAGE in $(nix flake show --json | jq -r '.packages["x86_64-linux"] | keys | .[]' | grep whisper); do
          echo "Building $PACKAGE" > /dev/stderr
          # nix build .#"\"$PACKAGE\"" -L

          nix build --impure --expr '
          let pkgs = import <nixpkgs> {};
          in pkgs.dockerTools.buildImage {
            name = "hello";
            tag = "latest";
            copyToRoot = [ pkgs.hello ];
            config.Cmd = [ "$${pkgs.hello}/bin/hello" ];
          }
          '

          echo "Pushing $PACKAGE" > /dev/stderr
          IMAGE_NAME="vast-ai-nix-$PACKAGE"
          IMAGE="ghcr.io/$CI_REPO_OWNER/$IMAGE_NAME"
          skopeo --insecure-policy copy --dest-creds="$CI_REPO_OWNER:$GITHUB_PACKAGES_TOKEN" docker-archive:result "docker://$IMAGE:latest"
          skopeo --insecure-policy copy --dest-creds="$CI_REPO_OWNER:$GITHUB_PACKAGES_TOKEN" docker-archive:result "docker://$IMAGE:$CI_COMMIT_SHA"
        done
